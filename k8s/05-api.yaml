apiVersion: apps/v1
kind: Deployment
metadata:
  name: edi-api
  namespace: edi-processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edi-api
  template:
    metadata:
      labels:
        app: edi-api
    spec:
      containers:
      - name: api
        image: golang-backend-task-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: edi-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: edi-api
  namespace: edi-processing
spec:
  selector:
    app: edi-api
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
