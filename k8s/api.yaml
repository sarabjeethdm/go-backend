apiVersion: apps/v1
kind: Deployment
metadata:
  name: edi-api
  namespace: edi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edi-api
  template:
    metadata:
      labels:
        app: edi-api
    spec:
      containers:
      - name: api
        image: edi-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: edi-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edi-api
  namespace: edi
spec:
  selector:
    app: edi-api
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
