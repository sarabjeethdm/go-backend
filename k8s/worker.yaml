apiVersion: apps/v1
kind: Deployment
metadata:
  name: edi-worker
  namespace: edi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edi-worker
  template:
    metadata:
      labels:
        app: edi-worker
    spec:
      containers:
      - name: worker
        image: edi-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9091
        envFrom:
        - configMapRef:
            name: edi-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: edi-worker
  namespace: edi
spec:
  selector:
    app: edi-worker
  ports:
  - port: 9091
    targetPort: 9091
  type: ClusterIP
