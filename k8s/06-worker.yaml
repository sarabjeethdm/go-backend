apiVersion: apps/v1
kind: Deployment
metadata:
  name: edi-worker
  namespace: edi-processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edi-worker
  template:
    metadata:
      labels:
        app: edi-worker
    spec:
      containers:
      - name: worker
        image: golang-backend-task-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9091
          name: metrics
        envFrom:
        - configMapRef:
            name: edi-config
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9091
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9091
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: edi-worker
  namespace: edi-processing
spec:
  selector:
    app: edi-worker
  ports:
  - port: 9091
    targetPort: 9091
    name: metrics
  type: ClusterIP
