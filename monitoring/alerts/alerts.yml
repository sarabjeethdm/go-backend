groups:
  - name: edi_job_alerts
    interval: 30s
    rules:
      # Alert when job failure rate exceeds 10% over 5 minutes
      - alert: HighJobFailureRate
        expr: |
          (
            rate(edi_jobs_total{status="failed"}[5m]) 
            / 
            (rate(edi_jobs_total{status="completed"}[5m]) + rate(edi_jobs_total{status="failed"}[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "High job failure rate detected"
          description: "Job failure rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      # Alert when job failure rate exceeds 25%
      - alert: CriticalJobFailureRate
        expr: |
          (
            rate(edi_jobs_total{status="failed"}[5m]) 
            / 
            (rate(edi_jobs_total{status="completed"}[5m]) + rate(edi_jobs_total{status="failed"}[5m]))
          ) > 0.25
        for: 2m
        labels:
          severity: critical
          component: worker
        annotations:
          summary: "Critical job failure rate detected"
          description: "Job failure rate is {{ $value | humanizePercentage }} (threshold: 25%)"

      # Alert when job processing is taking too long (p95 > 60s)
      - alert: SlowJobProcessing
        expr: |
          histogram_quantile(0.95, 
            rate(edi_job_processing_duration_seconds_bucket[5m])
          ) > 60
        for: 10m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "Job processing is slow"
          description: "95th percentile of job processing duration is {{ $value | humanizeDuration }} (threshold: 60s)"

      # Alert when job processing is extremely slow (p95 > 120s)
      - alert: VerySlowJobProcessing
        expr: |
          histogram_quantile(0.95, 
            rate(edi_job_processing_duration_seconds_bucket[5m])
          ) > 120
        for: 5m
        labels:
          severity: critical
          component: worker
        annotations:
          summary: "Job processing is extremely slow"
          description: "95th percentile of job processing duration is {{ $value | humanizeDuration }} (threshold: 120s)"

      # Alert when no jobs are being processed for 10 minutes (but queue has items)
      - alert: JobProcessingStalled
        expr: |
          rate(edi_jobs_total[10m]) == 0 and edi_redis_queue_size > 0
        for: 10m
        labels:
          severity: critical
          component: worker
        annotations:
          summary: "Job processing has stalled"
          description: "No jobs have been processed in the last 10 minutes, but queue has {{ $value }} items"

  - name: edi_queue_alerts
    interval: 30s
    rules:
      # Alert when queue size is growing (> 100 items)
      - alert: QueueBackingUp
        expr: edi_redis_queue_size > 100
        for: 5m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Redis queue is backing up"
          description: "Redis queue size is {{ $value }} items (threshold: 100)"

      # Alert when queue size is very large (> 500 items)
      - alert: QueueCriticallyBacked
        expr: edi_redis_queue_size > 500
        for: 2m
        labels:
          severity: critical
          component: queue
        annotations:
          summary: "Redis queue is critically backed up"
          description: "Redis queue size is {{ $value }} items (threshold: 500)"

      # Alert when queue size is growing rapidly
      - alert: QueueGrowingRapidly
        expr: |
          deriv(edi_redis_queue_size[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Queue is growing rapidly"
          description: "Queue is growing at {{ $value }} items per second"

  - name: edi_api_alerts
    interval: 30s
    rules:
      # Alert when API error rate is high (> 5%)
      - alert: HighAPIErrorRate
        expr: |
          (
            sum(rate(edi_api_requests_total{status=~"5.."}[5m])) 
            / 
            sum(rate(edi_api_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Alert when API error rate is critical (> 10%)
      - alert: CriticalAPIErrorRate
        expr: |
          (
            sum(rate(edi_api_requests_total{status=~"5.."}[5m])) 
            / 
            sum(rate(edi_api_requests_total[5m]))
          ) > 0.10
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Critical API error rate"
          description: "API error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      # Alert when API response time is slow (p95 > 1s)
      - alert: SlowAPIResponse
        expr: |
          histogram_quantile(0.95, 
            rate(edi_api_request_duration_seconds_bucket[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API response time is slow"
          description: "95th percentile of API response time is {{ $value | humanizeDuration }} (threshold: 1s)"

      # Alert when API is down (no requests in 5 minutes)
      - alert: APIDown
        expr: |
          rate(edi_api_requests_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API is down or not receiving requests"
          description: "No API requests received in the last 5 minutes"

  - name: edi_worker_alerts
    interval: 30s
    rules:
      # Alert when no workers are active
      - alert: NoActiveWorkers
        expr: edi_active_jobs == 0 and edi_redis_queue_size > 0
        for: 5m
        labels:
          severity: critical
          component: worker
        annotations:
          summary: "No active workers processing jobs"
          description: "No jobs are being actively processed, but {{ $value }} items are in queue"

      # Alert when too many jobs are stuck in processing
      - alert: TooManyActiveJobs
        expr: edi_active_jobs > 50
        for: 10m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "Too many jobs are stuck in processing state"
          description: "{{ $value }} jobs are currently active (threshold: 50)"

      # Alert when worker retry rate is high
      - alert: HighRetryRate
        expr: |
          sum(rate(edi_job_retries_total[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "High job retry rate"
          description: "Job retry rate is {{ $value }} retries per second"
